name: build

# Full build on every push/PR. On a release tag (v*), additionally capture the
# binary and publish it as a GitHub Release asset (one tarball per target), with
# a signed build-provenance attestation.
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

# Least privilege by default; the release job widens its own grant below.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Verify + build. Runs for every push and PR. Builds linux-x64 to prove the
  # binary compiles; the release job rebuilds per target with the same matrix.
  # ---------------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build (linux-x64)
        run: ./build.sh linux-x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lualambda-linux-x64
          path: build/linux-x64/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release capture. Only on a v* tag. Builds each target, tarballs the per-
  # target dir, and attaches the tarballs to the GitHub Release for the tag.
  # The CLI is pure TS so Bun cross-compiles all targets from one Linux runner;
  # expand `matrix.target` to add mac/windows.
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the GitHub Release + attach assets
      id-token: write # OIDC signing for build provenance attestation
      attestations: write # upload the provenance attestation
    strategy:
      matrix:
        target:
          - linux-x64
          # Expand later:
          # - linux-arm64
          # - darwin-x64
          # - darwin-arm64
          # - windows-x64
          # - windows-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (${{ matrix.target }})
        run: ./build.sh ${{ matrix.target }}

      # Signed build provenance for the binary itself — verifiable with
      # `gh attestation verify lualambda --repo <owner>/<repo>` after extraction.
      # (windows targets emit lualambda.exe; adjust subject-path when enabled.)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/${{ matrix.target }}/lualambda

      - name: Package tarball
        run: tar -czf "lualambda-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" -C "build/${{ matrix.target }}" .

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: lualambda-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          generate_release_notes: true
